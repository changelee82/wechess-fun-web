        <div class="coord-col right">

        </div>
      </div>
      <div class="coord-row bottom">
        <span>a</span><span>b</span><span>c</span><span>d</span><span>e</span><span>f</span><span>g</span><span>h</span>
      </div>
    </div>

      <div class="right-panel">
        <!-- 信息区 -->
        <div class="score-area">
          <!-- 信息行 -->

            <span class="score" id="score">0分</span>

        <!-- 按钮区 -->
        <div class="button-area">

          </footer>
        </div>
      </div>
    </div>
  </div>

  <!-- 规则对话框 -->
  <div class="modal-overlay" id="infoModal">
    <div class="modal-content">
      <p class="modal-text" id="modalText"></p>
      <div class="modal-actions">
        <button class="md-btn" id="modalCloseBtn">知道了</button>

  </div>

  <!-- 游戏结束对话框 -->
  <div class="modal-overlay" id="gameOverModal">
    <div class="modal-content gameover-content">
      <button class="gameover-close" id="gameOverCloseBtn">

      <div class="gameover-record">个人最高纪录 <span id="highScore">0</span> 分</div>

        <button class="gameover-btn md-btn" id="shareBtn">

        </button>
      </div>
    </div>
  </div>

  <script src="../common/game-shell.js?t=202606061030"></script>
